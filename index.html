<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="mobile.css"
      media="only screen and (max-width: 768px)"
    />
  </head>
  <body>
    <!--Confeti Atras-->
    <canvas id="canvas1"></canvas>

    <!--Globos Atras-->
    <canvas id="canvas3"></canvas>

    <div class="contenedor">
      <!-- PortaRetrato -->
      <div class="portaretrato-torta-caja">
        <div class="portaretrato">
          <div class="marco">
            <img src="recursos/Yurey.retrato.jpeg" alt="Foto" />
          </div>
          <div class="soporte-marco"></div>
        </div>

        <!--Torta De Cumpleaños-->
        <div class="torta-cumpleaños">
          <div class="torta">
            <div class="chocolate"></div>
          </div>
          <div class="vela"></div>
          <div class="llama"></div>
          <div class="vela-overlay"></div>
        </div>

        <!--Caja De Regalo-->
        <div class="caja-wrapper">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>
            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>
            <div class="regalo"></div>
            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

        <!--Mensaje Feliz Cumpleaños-->
        <div class="happy-birthday">Feliz Cumpleaños</div>
      </div>

      <!--Mesa-->
      <div class="soporte"></div>

      <!--Galería de Marcos-->
      <div class="galeria-marcos">
        <div class="marco-grande foto-1">
          <img src="recursos/foto1.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-2">
          <img src="recursos/foto2.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-3">
          <img src="recursos/foto3.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-4">
          <img src="recursos/foto4.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-5">
          <img src="recursos/foto5.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-7">
          <img src="recursos/foto6.jpeg" alt="Foto" />
                  <div class="marco-grande foto-4">
          <img src="recursos/foto4.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-8">
          <img src="recursos/foto5.jpeg" alt="Foto" />
        </div>
        <div class="marco-grande foto-9">
          <img src="recursos/foto6.jpeg" alt="Foto" />
        </div>
      </div>
  

    </div>

    <!-- Carta Modal -->
    <div class="modal-carta" id="modalCarta">
      <div class="contenido-carta">
        <div class="carta">
          <h2>Querida Yurey</h2>
          <p>
            En este día tan especial quiero desearte un feliz cumpleaños lleno
            de alegría, risas y momentos inolvidables. 
          </p>
          <p class="firma">Con cariño,<br />Owen</p>
        </div>
      </div>
    </div>

    <!--Confeti Delante-->
    <canvas id="canvas2"></canvas>

    <!--Globos Delante-->
    <canvas id="canvas4"></canvas>

    <!--Todo Oscuro-->
    <audio id="soplido" src="recursos/soplar2.mp3" preload="auto"></audio>
    <audio
      id="cancion"
      src="recursos/cancion.mp3"
      preload="auto"
    ></audio>
    <div class="overlay"></div>

    <script src="Confeti.js"></script>
    <script src="Globos.js"></script>
    <script src="Globos2.js"></script>
    <script src="Confeti2.js"></script>
    <script src="Sorpresa.js"></script>
  </body>
</html>
