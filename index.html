<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="mobile.css"
      media="only screen and (max-width: 768px)"
    />
  </head>
  <body>
    <!--Banderetas-->
    <div class="banderetas">
      <svg class="cuerda-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 80" preserveAspectRatio="none">
        <path d="M0,80 Q250,60 500,0" fill="none" stroke="rgba(100,100,100,0.4)" stroke-width="2"/>
        <path d="M1000,80 Q750,60 500,0" fill="none" stroke="rgba(100,100,100,0.4)" stroke-width="2"/>
      </svg>
      <div class="bandereta b1"></div>
      <div class="bandereta b2"></div>
      <div class="bandereta b3"></div>
      <div class="bandereta b4"></div>
      <div class="bandereta b5"></div>
      <div class="bandereta b6"></div>
      <div class="bandereta b7"></div>
      <div class="bandereta b8"></div>
      <div class="bandereta b9"></div>
      <div class="bandereta b10"></div>
    </div>
    
    <!--Confeti Atras-->
    <canvas id="canvas1"></canvas>

    <!--Serpentinas Atras-->
    <canvas id="canvas6"></canvas>

    <div class="contenedor">
      <!-- PortaRetrato -->
      <div class="portaretrato-torta-caja">
        <div class="portaretrato">
          <div class="marco">
            <img src="recursos/Yurey.retrato.jpg" alt="Foto" />
          </div>
          <div class="soporte-marco"></div>
        </div>

        <!--Torta De Cumpleaños-->
        <div class="torta-cumpleaños">
          <div class="torta-wrapper">
            <div class="torta">
              <div class="chocolate"></div>
            </div>
          </div>
          <div class="vela">
            <div class="mecha"></div>
          </div>
          <div class="llama"></div>
          <div class="vela-overlay"></div>
        </div>

        <!--Caja De Regalo-->
        <div class="caja-wrapper">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>
            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>
            <div class="regalo"></div>
            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

        <!--Mensaje Feliz Cumpleaños-->
        <div class="happy-birthday">
          <div class="gorro-wrapper">
            <div class="gorro"></div>
          </div>
          <div class="gorro-pompom"></div>
          <div class="gorro-bola"></div>
          <span class="feliz">Feliz</span><br>
          <span class="cumpleanos">Cumpleaños</span>
        </div>

      </div>

      <!--Mesa-->
      <div class="soporte"></div>
      <canvas class="migas-canvas"></canvas>

      <!--Galería de Marcos-->
      <div class="galeria-marcos">
        <div class="marco-grande foto-1 polaroid">
          <img src="recursos/foto1.png" alt="Foto" />
        </div>
        <div class="marco-grande foto-2">
          <img src="recursos/foto2.png" alt="Foto" />
          <div class="esquina esquina-tl"></div>
          <div class="esquina esquina-tr"></div>
          <div class="esquina esquina-bl"></div>
          <div class="esquina esquina-br"></div>
        </div>
        <div class="marco-grande foto-3 polaroid rectangular">
          <img src="recursos/foto3.png" alt="Foto" />
        </div>
        <div class="marco-grande foto-4 polaroid">
          <img src="recursos/foto4.png" alt="Foto" />
        </div>
        <div class="marco-grande foto-5 polaroid rectangular">
          <img src="recursos/foto5.png" alt="Foto" />
        </div>
        <div class="marco-grande foto-6 polaroid rectangular">
          <img src="recursos/foto6.png" alt="Foto" />
        </div>
        <div class="marco-grande foto-7 polaroid">
          <img src="recursos/foto7.png" alt="Foto" />
        </div>
        <div class="marco-grande foto-8">
          <img src="recursos/foto8.png" alt="Foto" />
          <div class="esquina esquina-tl"></div>
          <div class="esquina esquina-tr"></div>
          <div class="esquina esquina-bl"></div>
          <div class="esquina esquina-br"></div>
        </div>
        <div class="marco-grande foto-9">
          <img src="recursos/foto9.png" alt="Foto" />
          <div class="esquina esquina-tl"></div>
          <div class="esquina esquina-tr"></div>
          <div class="esquina esquina-bl"></div>
          <div class="esquina esquina-br"></div>
        </div>
      </div>

      <!--Base de la mesa-->
      <div class="base-mesa"></div>  

    </div>

    <!-- Carta Modal -->
    <div class="modal-carta" id="modalCarta">
      <div class="contenido-carta">
        <div class="carta">
          <h2></h2>
          <p>
         
          </p>
          <p class="firma"><br /></p>
        </div>
      </div>
    </div>

    <!--Confeti Delante-->
    <canvas id="canvas2"></canvas>

    <!--Serpentinas-->
    <canvas id="canvas5"></canvas>

    <!--Globos Delante-->
    <canvas id="canvas4"></canvas>

    <!--Todo Oscuro-->
    <audio id="soplido" src="recursos/soplar2.mp3" preload="auto"></audio>
    <audio
      id="cancion"
      src="recursos/cancion.mp3"
      preload="auto"
    ></audio>
    <div class="overlay"></div>

    <script src="Confeti.js"></script>
    <script src="Globos2.js"></script>
    <script src="Confeti2.js"></script>
    <script src="Serpentinas.js"></script>
    <script src="Serpentinas2.js"></script>
    <script src="Sorpresa.js"></script>
  </body>
</html>
